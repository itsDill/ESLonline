<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wacha - Student Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }
      h1 {
        color: #667eea;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      .section {
        margin-bottom: 30px;
      }
      .section-title {
        color: #667eea;
        font-size: 1.2em;
        margin-bottom: 15px;
        font-weight: 600;
      }
      .content {
        color: #555;
        line-height: 1.6;
      }
      .field {
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
      }
      .label {
        font-weight: 600;
        color: #333;
      }
      .value {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
      <h1>👥 Wacha</h1>

      <div class="section">
        <div class="section-title">Learning Info</div>
        <div class="field">
          <span class="label">Level:</span>
          <span class="value">Beginner</span>
        </div>
        <div class="field">
          <span class="label">Focus:</span>
          <span class="value">Conversational English</span>
        </div>
        <div class="field">
          <span class="label">Progress:</span>
          <span class="value">30%</span>
        </div>
        <div class="field">
          <span class="label">Status:</span>
          <span class="value">Active</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Notes</div>
        <div class="content">
          <!-- Add student notes here -->
        </div>
      </div>
    </div>
  </body>
</html>
